server {
    listen 3000;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Assets com hash no nome (index-XXXX.js, *.css, imagens) — cache longo;
    # qualquer mudança gera novo hash, então cache nunca fica obsoleto.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # HTML (index, fallback SPA) — NUNCA cachear. Garante que o navegador
    # sempre carregue o HTML novo a cada deploy, e com ele baixe a referência
    # ao bundle JS atualizado (cujo hash mudou). Sem isso o usuário fica
    # preso à versão antiga do app até limpar cache manualmente.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        expires 0;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        try_files $uri $uri/ /index.html;
    }
}
