[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
markers =
    auth: testes de autenticação
    rbac: testes de autorização / RBAC
    admin: testes do módulo admin
    staff: testes do módulo staff
    client: testes da área do cliente
    checkout: testes do checkout/pagamentos
    integration: testes que cruzam módulos
    slow: testes mais demorados
filterwarnings =
    ignore::DeprecationWarning:flask_sqlalchemy.*
    ignore::DeprecationWarning:sqlalchemy.*
